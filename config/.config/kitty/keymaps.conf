#: Keybinding for MacOS
macos_option_as_alt yes
select_by_word_characters *?_-.[]~&;!#$%^(){}<>

# unmaps default cmd+k behavior (clear)
map cmd+k no_op

# NOTE: kitty_mod is NOT a leader key — it's a held-key combo shorthand.
# The actual leader key is cmd+k>* (sequential chord syntax below).
kitty_mod cmd+ctrl+alt

# Neovim passthrough — disable kitty's default handling
map ctrl+shift+l        no_op
map ctrl+shift+u        no_op

# ── CLIPBOARD ──────────────────────────────────────────────────────────────
map cmd+v               paste_from_clipboard
map cmd+alt+v           paste_from_selection
map cmd+c               copy_to_clipboard

# ── NATURAL EDITING (Mac) ──────────────────────────────────────────────────
# NOTE: this does not work in neovim - see Neoed keybindings 

### jump to end of line:
map cmd+right           send_text all \x05
### jump to start of line:
map cmd+left            send_text all \x01
### jump right to end of word:
map alt+right           send_text all \x1b\x66
### jump left to beginning of word:
map alt+left            send_text all \x1b\x62
### delete line from cursor position to start of line:
map cmd+backspace       send_text all \x15
### delete word works by default via opt+backspace
### undo:
map cmd+z               send_text all \x1f

# ── OS WINDOW / QUIT ──────────────────────────────────────────────────────
map cmd+n               new_os_window
map cmd+shift+w         close_os_window

# ── TAB MANAGEMENT ────────────────────────────────────────────────────────
map cmd+t               new_tab
map cmd+w               close_tab
map cmd+1               goto_tab 1
map cmd+2               goto_tab 2
map cmd+3               goto_tab 3
map cmd+4               goto_tab 4
map cmd+5               goto_tab 5
map cmd+6               goto_tab 6
map cmd+7               goto_tab 7
map cmd+8               goto_tab 8
map cmd+9               goto_tab 9

# ── PANE/WINDOW NAVIGATION ─────────────────────────────────────────────────
map cmd+]               next_window
map cmd+[               previous_window

# ── RESIZE (ctrl+cmd+arrow fallbacks) ────────────────────────────────────
map cmd+k>r             start_resizing_window
map ctrl+cmd+right      resize_window narrower
map ctrl+cmd+left       resize_window wider
map ctrl+cmd+up         resize_window taller
map ctrl+cmd+down       resize_window shorter 3
map ctrl+cmd+0       resize_window reset


# ── FONT SIZE ─────────────────────────────────────────────────────────────
map cmd+shift+=         increase_font_size
map cmd+shift+-         decrease_font_size
map cmd+shift+0         reset_font_size


# ── FULLSCREEN ────────────────────────────────────────────────────────────
# Note: WezTerm config defines cmd+ctrl+f for fullscreen but the fzf binding
# below shadows it; we use cmd+shift+f here to keep fullscreen actually reachable.
map cmd+shift+f         toggle_fullscreen


# ── fzf.fish KEYBINDINGS ───────────────────────────────────────────────────
# Cmd+Ctrl sends escape sequences to fish (matches WezTerm fzf bindings)
map cmd+ctrl+f          send_text all \x1b\x06
map cmd+ctrl+l          send_text all \x1b\x0c
map cmd+ctrl+s          send_text all \x1b\x13
map cmd+ctrl+r          send_text all \x12
map cmd+ctrl+p          send_text all \x1b\x10
map cmd+ctrl+v          send_text all \x16
map shift+enter         send_text all \x1b\r


# Tab navigation
map kitty_mod+h         previous_tab
map kitty_mod+l         next_tab
map kitty_mod+]         move_tab_backward
map kitty_mod+[         move_tab_forward

# Quick splits (my WezTerm: SUPER|CTRL|ALT+\ → vsplit, +- → hsplit)
map kitty_mod+\         launch --location=vsplit --cwd=current
map kitty_mod+-         launch --location=hsplit --cwd=current

# Toggle zoom (my WezTerm: SUPER|CTRL|ALT+z)
map kitty_mod+z         toggle_layout stack

# Reload config (my WezTerm: SUPER|CTRL|ALT+,)
map kitty_mod+,         load_config_file

# Close pane (my WezTerm: CMD|CTRL+=)
map cmd+ctrl+=          close_window

# Pass cmd+ctrl+alt+c/o/p through to Neovim for Claude Code / OpenCode / Pi
# (kitty_mod captures all keys with this modifier, so we explicitly pass these through)
# CSI u format: codepoint;modifier-flags+1 — modifier 15 = super+alt+ctrl
map kitty_mod+c         send_text all \x1b[99;15u
map kitty_mod+o         send_text all \x1b[111;15u
map kitty_mod+p         send_text all \x1b[112;15u

# ── LEADER (cmd+k) ────────────────────────────────────────────────────────

# General
map cmd+k>p             kitty_shell window
map cmd+k>space         kitty_shell window
map cmd+k>k             clear_terminal scroll active

# Window/Pane
map cmd+k>n             new_os_window_with_cwd
map cmd+k>x             close_window

# Splits
map cmd+k>backslash     launch --location=vsplit --cwd=current
map cmd+k>minus         launch --location=hsplit --cwd=current

# Directional splits (kitty limitation: no true directional splits)
# h/l → vsplit (splits right), j/u → hsplit (splits below)
map cmd+k>h             launch --location=vsplit --cwd=current
map cmd+k>l             launch --location=vsplit --cwd=current
map cmd+k>j             launch --location=hsplit --cwd=current
map cmd+k>u             launch --location=hsplit --cwd=current

# Focus/Zoom
map cmd+k>z             toggle_layout stack
map cmd+k>=             toggle_layout stack

# Tab management
map cmd+k>t             new_tab_with_cwd
map cmd+k>e             set_tab_title
map cmd+k>T             select_tab
map cmd+k>1             goto_tab 1
map cmd+k>2             goto_tab 2
map cmd+k>3             goto_tab 3
map cmd+k>4             goto_tab 4
map cmd+k>5             goto_tab 5
map cmd+k>6             goto_tab 6
map cmd+k>7             goto_tab 7
map cmd+k>8             goto_tab 8
map cmd+k>9             goto_tab 9

# Tab move
map cmd+k>comma         move_tab_backward
map cmd+k>period        move_tab_forward

# Copy mode (kitty uses scrollback pager instead of vim-like copy mode)
map cmd+k>c             show_scrollback

# Sessions (WezTerm workspace parity)
# cmd+k w → browse/switch sessions (fuzzy picker), cmd+k W → save current as session
map cmd+k>w             goto_session ~/.config/kitty/sessions
map cmd+k>W             save_as_session --use-foreground-process --base-dir ~/.config/kitty/sessions
# Jump to dotfiles session directly
map cmd+k>S             goto_session ~/.config/kitty/sessions/dotfiles.kitty-session

# Session navigation (WezTerm parity: cmd+ctrl+alt+j/k = next/prev workspace)
map cmd+ctrl+alt+j      goto_session +1
map cmd+ctrl+alt+k      goto_session -1

# Debug overlay (WezTerm parity: cmd+k Shift+B)
map cmd+k>shift+b       debug_config
