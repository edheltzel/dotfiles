# vim:fileencoding=utf-8:foldmethod=marker

editor  /opt/homebrew/bin/nvim
allow_remote_control yes
listen_on unix:/tmp/kitty

#: Fonts
font_size 19.0
font_family Lilex Nerd Font Mono
font_weight normal

#: Text cursor customization
cursor_shape block
cursor_shape_unfocused hollow
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

#: Scrollback
scrollback_lines 10000

#: Mouse
url_style dotted
copy_on_select yes
open_url_modifiers cmd
cursor_shape block
cursor_trail 1
mouse_hide_wait 3.0

## External Files
include ./layout.conf
include ./os-tweaks.conf
include ./keymaps.conf

startup_session sessions/startup.kitty-session

# Scope tab bar to active session only (kitty >= 0.43.0)
tab_bar_filter session:~ or session:^$

# BEGIN_KITTY_THEME
inactive_text_alpha 0.35
background_opacity 1.0
background_blur 25
include ./themes/rose-pine.conf
#include ./themes/rose-pine-moon.conf
# END_KITTY_THEME
