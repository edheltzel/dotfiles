
#### This config is inteneded to be paired with the Leaderkey app #######
#### https://github.com/mikker/LeaderKey OR https://tunaformac.com/ ####

config-version = 2
after-startup-command = [
  'exec-and-forget borders active_color=0xffa48cf2 inactive_color=0xff3B446A width=5.0',
]
start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

default-root-container-layout = 'tiles' #Possible values: tiles|accordion
default-root-container-orientation = 'auto'
accordion-padding = 15

automatically-unhide-macos-hidden-apps = false #focuses app regardless of visibility
persistent-workspaces = ["ai", "hq", "code", "design", "comms", "overflow"]
exec-on-workspace-change = [
  '/bin/bash',
  '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUS_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]
on-focus-changed = [
  'move-mouse window-lazy-center',
  'exec-and-forget sketchybar --trigger aerospace_focus_change',
]
on-mode-changed = ['exec-and-forget sketchybar --trigger aerospace_mode_change']

[gaps]
inner.horizontal = 5
inner.vertical = 5
outer.top = 2
outer.left = 5
outer.right = 5
outer.bottom = 5

[key-mapping]
preset = 'qwerty'

[mode.main.binding] # hyper+w+<NUMBER>
alt-ctrl-shift-0 = 'workspace hq' # 0 -> primary workspace
alt-ctrl-shift-1 = 'workspace code' # 1 -> dev
alt-ctrl-shift-2 = 'workspace ai' # 2 -> ai tooling
alt-ctrl-shift-3 = 'workspace design' # 3 -> design
alt-ctrl-shift-4 = 'workspace comms' # 4 -> comms
alt-ctrl-shift-5 = 'workspace overflow' # 5 -> overflow

# cycle through workspaces (wraps around)
alt-ctrl-shift-i = 'workspace next --wrap-around'
alt-ctrl-shift-u = 'workspace prev --wrap-around'

# cycle through windows (wraps around)
alt-ctrl-shift-h = 'focus --boundaries-action wrap-around-the-workspace left'
alt-ctrl-shift-l = 'focus --boundaries-action wrap-around-the-workspace right'

# jumps
# alt-ctrl-shift-i = 'focus-back-and-forth'     #last 2 windows
# alt-ctrl-shift-u = 'workspace-back-and-forth' #last 2 workspaces

[mode.resize.binding] # hyper+w+s
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
0 = 'balance-sizes'
esc = 'mode main'
enter = 'mode main'

[mode.move.binding] # hyper+w+m
h = 'move left'
j = 'move down'
k = 'move up'
l = 'move right'
esc = 'mode main'
enter = 'mode main'

### Dedicated Workspaces of Apps ###
[[on-window-detected]] # HQ Workspace
if.app-name-regex-substring = 'Helium|Zen|Safari*|Google Chrome'
run = "move-node-to-workspace hq"

[[on-window-detected]] # Coding Workspace
if.app-name-regex-substring = '.*Code|Zed|Ghostty|Obsidian|Typora|Text*'
run = "move-node-to-workspace code"

[[on-window-detected]] # Ai Workspace
if.app-name-regex-substring = 'Claude|Codex|Maestro|Superconductor|Superset'
run = "move-node-to-workspace ai"

[[on-window-detected]] # Designing Workspace
if.app-name-regex-substring = ".*Creative|Adobe|Figma|Affinity|Shapr3D|.*Fusion|.*CAD|.*Slicer|.*Studio|.*Orca|AnycubicPhotonWorkshop|Microsoft (?!Teams).*|GIMP|Inkscape|HueForge"
run = "move-node-to-workspace design"

[[on-window-detected]] # Comms Workspace
if.app-name-regex-substring = 'Messages|Microsoft Teams|Slack|Discord|WhatsApp|Bazecor|VIA|Vial'
run = "move-node-to-workspace comms"

[[on-window-detected]] # Overflow Workspace
if.app-name-regex-substring = 'Notes|Reminders|Freeform|Podcasts'
run = "move-node-to-workspace overflow"

[[on-window-detected]] # Overflow Workspace with floating windows
if.app-name-regex-substring = '.*toggl|Font Book|Cyberduck'
run = ['layout floating', 'move-node-to-workspace overflow']

# Always Floating Windows
[[on-window-detected]]
if.app-name-regex-substring = '.*Finder|.*raycast*|.*karabiner|.*colorslurp|.*ice|.*shottr|.*dropbox|.*keka|Preview|Print Center|superwhisper|Stickies|Tuna'
run = "layout floating"
