# =============================================================================
# herdr custom themes — REFERENCE ONLY (this file is NOT loaded by herdr)
# =============================================================================
# herdr only reads ~/.config/herdr/config.toml. Theme customization lives in a
# [theme.custom] block there, applied on top of [theme] name. Editing THIS file
# changes nothing on its own — paste a block into config.toml and run:
#     herdr server reload-config
#
# Valid keys = herdr's CustomThemeColors struct (16):
#   panel_bg accent surface_dim surface0 surface1 overlay0 overlay1
#   text subtext0 mauve red peach yellow green teal blue
# Token roles:
#   accent       highlights, borders, navigation
#   panel_bg     sidebar / panel background
#   surface_dim  active workspace background
#   surface0     selection background
#   surface1     hover / active
#   overlay0     muted text
#   overlay1     secondary accent
#   text         primary text
#   subtext0     dimmed labels
#   mauve        git branches
# Values: hex "#rrggbb", "rgb(r,g,b)", named colors, or "reset"/"default"/"none".
# =============================================================================

# -----------------------------------------------------------------------------
# Catppuccin Latte — contrast-tuned (archived reference)
# Fixes stock latte's washed-out muted text by mapping it to darker subtext greys
# and widening surface separation, while keeping canonical Latte accents.
# -----------------------------------------------------------------------------
# [theme]
# name = "catppuccin-latte"
#
# [theme.custom]
# panel_bg    = "#e6e9ef"  # mantle   — sidebar / panel background
# surface_dim = "#ccd0da"  # surface0 — active workspace background
# surface0    = "#bcc0cc"  # surface1 — selection background
# surface1    = "#acb0be"  # surface2 — hover / active
# text        = "#4c4f69"  # text     — primary text
# subtext0    = "#5c5f77"  # subtext1 — dimmed labels (darker than stock)
# overlay0    = "#6c6f85"  # subtext0 — muted text   (darker than stock overlay)
# overlay1    = "#7287fd"  # lavender — secondary accent
# accent      = "#1e66f5"  # blue     — highlights, borders, navigation
# mauve       = "#8839ef"  # mauve    — git branches
# red         = "#d20f39"  # red
# peach       = "#fe640b"  # peach
# yellow      = "#df8e1d"  # yellow
# green       = "#40a02b"  # green
# teal        = "#179299"  # teal
# blue        = "#1e66f5"  # blue

# -----------------------------------------------------------------------------
# Eldritch — cosmic-horror dark (the live theme; mirror of config.toml)
# Palette matched to Ed's terminal eldritch (Ghostty/Kitty). Glacial cyan accent,
# toxic-green and mauve secondary accents over a deep blue-black.
# Base name = "terminal" so anything the 16 tokens don't cover follows the
# (eldritch) terminal palette.
# -----------------------------------------------------------------------------
# [theme]
# name = "terminal"
#
# [theme.custom]
# panel_bg    = "#171928"  # bg          — sidebar / panel background
# surface_dim = "#212337"  # bg2         — active workspace background
# surface0    = "#323449"  # bg_highlight— selection background
# surface1    = "#3b3e5c"  # raised      — hover / active (above surface_dim)
# overlay0    = "#7081d0"  # comment     — muted text
# overlay1    = "#a48cf2"  # purple      — secondary accent
# text        = "#ebfafa"  # fg          — primary text
# subtext0    = "#949ae5"  # dim-fg      — dimmed labels
# accent      = "#04d1f9"  # cyan        — highlights, borders, navigation
# mauve       = "#a48cf2"  # purple      — git branches
# red         = "#f16c75"  # red
# peach       = "#f7c67f"  # orange
# yellow      = "#f1fc79"  # yellow
# green       = "#37f499"  # green
# teal        = "#66e4fd"  # bright cyan
# blue        = "#9071f4"  # indigo

