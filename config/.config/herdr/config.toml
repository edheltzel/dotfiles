onboarding = false

[experimental]
allow_nested = true
kitty_graphics = true
resume_agents_on_restore = true
pane_history = false

[theme]
name = "terminal"

[ui]
show_agent_labels_on_pane_borders = true

[ui.toast]
enabled = true
delivery = "terminal"

[ui.sound]
enabled = true
path = "sounds/notification.mp3"
done_path = "sounds/done.mp3"
request_path = "sounds/request.mp3"

[keys]
prefix = "control+space"

detach = "prefix+d"
resize_mode = "prefix+r"
toggle_sidebar = "prefix+b"

fullscreen = "prefix+f"

goto=""
new_worktree=""
edit_scrollback =""

previous_agent = "alt+control+k"
next_agent = "alt+control+j"

new_workspace = "prefix+n"
close_workspace = "prefix+shift+w"
rename_workspace = "prefix+shift+e"
next_workspace = "alt+control+i"
previous_workspace = "alt+control+u"

new_tab = "prefix+t"
rename_tab = "prefix+e"
next_tab = "alt+control+l"
previous_tab = "alt+control+h"

split_vertical = "prefix+\\"
split_horizontal = "prefix+-"
close_pane = "prefix+x"
rename_pane = "prefix+p"
focus_pane_left = "alt+control+shift+h"
focus_pane_up = "alt+control+shift+k"
focus_pane_down = "alt+control+shift+j"
focus_pane_right = "alt+control+shift+l"

[[keys.command]]
key = "prefix+g"
type = "pane"
command = "lazygit"

[[keys.command]]
key = "prefix+/"
type = "pane"
command = "git diff | diffnav --unified"

[[keys.command]]
key = "prefix+v"
type = "pane"
command = "nvim"

[[keys.command]]
key = "prefix+y"
type = "pane"
command = "yazi"
