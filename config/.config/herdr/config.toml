onboarding = false

update.channel = "preview"

[experimental]
allow_nested = true
kitty_graphics = true
resume_agents_on_restore = true
pane_history = true

[theme]
name = "terminal"

[theme.custom]
# panel_bg    = "#e6e9ef"  # mantle   — sidebar / panel background
surface_dim = "#ededed"  # surface0 — active workspace background
surface0    = "#ced0da"  # surface1 — selection background
surface1    = "#acb0be"  # surface2 — hover / active
text        = "#1e66f5"  # text     — primary text
subtext0    = "#585b72"  # dimmed labels / agent names (BOLD)
overlay0    = "#4c4f69"  # muted text / agent type label (rendered DIM by herdr)
# overlay1    = "#7287fd"  # lavender — secondary accent
# accent      = "#1e66f5"  # blue     — highlights, borders, navigation
# mauve       = "#8839ef"  # mauve    — git branches
# red         = "#d20f39"  # red
# peach       = "#fe640b"  # peach
# yellow      = "#df8e1d"  # yellow
# green       = "#40a02b"  # green
# teal        = "#179299"  # teal
# blue        = "#1e66f5"  # blue

[ui]
prompt_new_tab_name = false
show_agent_labels_on_pane_borders = true
toast.enabled = true
toast.delivery = "terminal"
sound.enabled = true
sound.path = "sounds/notification.mp3"
sound.done_path = "sounds/done.mp3"
sound.request_path = "sounds/request.mp3"

[worktrees]
directory = "~/Developer/_Worktrees"

[keys]
prefix = "alt+control+,"

# reload_config ="prefix+shift+r"
goto=""
new_worktree=""
edit_scrollback =""

detach = "prefix+d"
resize_mode = "prefix+r"
toggle_sidebar = "prefix+b"

fullscreen = "prefix+f"

previous_agent = "alt+control+k"
next_agent = "alt+control+j"

new_workspace = "prefix+n"
close_workspace = "prefix+shift+w"
rename_workspace = "prefix+shift+e"
next_workspace = "alt+control+i"
previous_workspace = "alt+control+u"

new_tab = "prefix+t"
rename_tab = "prefix+e"
next_tab = "alt+control+l"
previous_tab = "alt+control+h"

split_vertical = "prefix+\\"
split_horizontal = "prefix+-"
close_pane = "prefix+x"
rename_pane = "prefix+p"
focus_pane_left = "alt+control+shift+h"
focus_pane_up = "alt+control+shift+k"
focus_pane_down = "alt+control+shift+j"
focus_pane_right = "alt+control+shift+l"

[[keys.command]]
key = "prefix+g"
type = "pane"
command = "lazygit"
description = "launch lazygit"

[[keys.command]]
key = "prefix+/"
type = "pane"
command = "git diff | diffnav --watch"
description = "launch diffnav"

[[keys.command]]
key = "prefix+v"
type = "pane"
command = "nvim"
description = "launch diffnav"

[[keys.command]]
key = "prefix+y"
type = "pane"
command = "yazi"
description = "launch yazi"


