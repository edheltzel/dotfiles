onboarding = false
[update]
channel = "preview"

[experimental]
allow_nested = true
kitty_graphics = true
resume_agents_on_restore = true
pane_history = true

onboarding = false

switch_ascii_input_source_in_prefix = true

[ui]
prompt_new_tab_name = false
show_agent_labels_on_pane_borders = true

agent_panel_sort = "spaces"

[ui.sound]
enabled = true
path = "sounds/notification.mp3"
done_path = "sounds/done.mp3"
request_path = "sounds/request.mp3"

[ui.toast]
delivery = "herdr"

[theme]
name = "terminal"

auto_switch = false

# Eldritch theme
[theme.custom]
surface_dim = "#212337" # bg2          — active workspace / agent row background
# panel_bg = "#171928"    # bg           — sidebar / panel background
# surface0 = "#323449" # bg_highlight — selection (navigate cursor) background
# surface1 = "#3b3e5c" # raised       — drag / hover (kept above surface_dim)
# overlay0 = "#7081d0"    # comment      — muted text
# overlay1 = "#a48cf2"    # purple       — secondary accent
# text = "#ebfafa"        # fg           — primary text
# subtext0 = "#949ae5"    # dim-fg       — dimmed labels
# accent = "#04d1f9"      # cyan         — highlights, borders, navigation
# mauve = "#a48cf2"       # purple       — git branches
# red = "#f16c75"         # red
# peach = "#f7c67f"       # orange
# yellow = "#f1fc79"      # yellow
# green = "#37f499"       # green
# teal = "#66e4fd"        # bright cyan
# blue = "#9071f4"        # indigo

[keys]
prefix = "control+alt+,"
detach = "prefix+shift+d"

# disabled
goto = ""
new_worktree = ""
edit_scrollback = ""
swap_pane_left = ""
swap_pane_down = ""
swap_pane_up = ""
swap_pane_right = ""

# close
close_workspace = "prefix+W"

# rename 
rename_workspace = "prefix+E"
rename_tab = "prefix+e"

# create term
new_workspace = "prefix+N"
new_tab = "prefix+t"
split_vertical = "prefix+\\"

# cycle
next_workspace = "control+alt+i"
previous_workspace = "control+alt+u"
next_tab = "control+alt+l"
previous_tab = "control+alt+h"
cycle_pane_next = "control+alt+]"
cycle_pane_previous = "control+alt+["
previous_agent = "control+alt+k"
next_agent = "control+alt+j"
# custom commands
[[keys.command]]
key = "prefix+g"
type = "pane"
command = "lazygit"
description = "launch LazyGit"

[[keys.command]]
key = "prefix+G"
type = "pane"
command = "lazyworktree"
description = "launch LazyWorktree"

[[keys.command]]
key = "prefix+d"
type = "pane"
command = "gh dash"
description = "launch Dash"

[[keys.command]]
key = "prefix+H"
type = "pane"
command = "hunk diff"
description = "launch Hunk Diff"

[[keys.command]]
key = "prefix+v"
type = "pane"
command = "nvim"
description = "launch Neovim"

[[keys.command]]
key = "prefix+y"
type = "pane"
command = "yazi"
description = "launch Yazi"

[[keys.command]]
key = "prefix+B"
type = "pane"
command = "gh board --owner edheltzel"
description = "launch Project Board"

#plugins
# jump to agent or workspace
[[keys.command]]
key = "prefix+j"
type = "plugin_action"
command = "agustinvalencia.herdr-jump.agents"

[[keys.command]]
key = "prefix+J"
type = "plugin_action"
command = "agustinvalencia.herdr-jump.spaces"
