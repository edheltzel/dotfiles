onboarding = false

[ui]
show_agent_labels_on_pane_borders = true
sound.enabled = true
toast.enabled = true
toast.delivery = "terminal"

[theme]
name = "terminal"

[experimental]
allow_nested = true
kitty_graphics = true

[keys]
prefix = "control+,"
detach = "d"
fullscreen = "f"
resize_mode = "r"
toggle_sidebar = "b"
split_vertical = "\\"
split_horizontal = "-"
close_pane = "x"
rename_pane = "p"
new_tab = "t"
rename_tab = "e"
new_workspace = "n"
close_workspace = "shift+w"
rename_workspace = "shift+e"
next_tab = "shift+alt+l"
previous_tab = "shift+alt+h"
next_workspace = "shift+alt+u"
previous_workspace = "shift+alt+i"
open_notification_target = "shift+alt+n"
previous_agent = "shift+alt+k"
next_agent = "shift+alt+j"
focus_pane_left = "shift+control+alt+h"
focus_pane_up = "shift+control+alt+k"
focus_pane_down = "shift+control+alt+j"
focus_pane_right = "shift+control+alt+l"
