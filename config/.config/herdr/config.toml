onboarding = false

[ui]
show_agent_labels_on_pane_borders = true
sound.enabled = true
toast.enabled = true
toast.delivery = "terminal"

[theme]
name = "terminal"

[experimental]
allow_nested = true
kitty_graphics = true

[keys]
prefix = "shift+alt+,"
detach = "prefix+d"
fullscreen = "prefix+f"
resize_mode = "prefix+r"
toggle_sidebar = "prefix+b"
split_vertical = "prefix+\\"
split_horizontal = "prefix+-"
close_pane = "prefix+x"
rename_pane = "prefix+p"
new_tab = "prefix+t"
rename_tab = "prefix+shift+t"
new_workspace = "prefix+n"
rename_workspace = "prefix+shift+n"
close_workspace = "prefix+shift+w"

next_tab = "shift+alt+l"
previous_tab = "shift+alt+h"
next_workspace = "shift+alt+u"
previous_workspace = "shift+alt+i"
open_notification_target = "shift+alt+n"
previous_agent = "shift+alt+k"
next_agent = "shift+alt+j"
focus_pane_left = "shift+control+alt+h"
focus_pane_up = "shift+control+alt+k"
focus_pane_down = "shift+control+alt+j"
focus_pane_right = "shift+control+alt+l"

