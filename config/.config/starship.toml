format = "$all"
# right_format = "$cmd_duration"

command_timeout = 500

[battery]
disabled = true

## start character ##
[character]
success_symbol = '[п„…](bold #9ECE6A)'
error_symbol = '[п„…](bold #F7768E)'

[shell]
fish_indicator = ""
unknown_indicator = "?"
style = "bold fg:white"
disabled = true
## end character ##

## start prompt ##
[directory]
format = "[вҡЎпёҺ](#7DCFFF)[$path]($style)[$read_only]($read_only_style) "
read_only = " п‘–"
truncation_symbol = "вҖҰу°ҝҹ"

[git_branch]
style = "#F141A8"
symbol = "пҗҳ "
format = "on [$symbol$branch(:$remote_branch)]($style)[ вүЎ]($style) "

[git_metrics]
disabled = false
added_style = "#9ECE6A"
deleted_style = "#F7768E"
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

[git_status]
style = "white"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "[пҗң ](fg:red bg:bright-black)"
ahead = "[пҗұ Г—${count} ](white)"
behind = "[пҗі Г—${count} ](white)"
diverged = "[пҗӮ пҗұГ—${ahead_count} пҗіГ—${behind_count} ](bg:bright-black)"
untracked = "пёҸ[пҗ  Г—${count} ](#F69F4D)"
stashed = "п‘ғ "
modified = "[п‘Ҳ Г—${count} ](#E0AF68)"
staged = "[п“җ Г—${count} ](bright-green)"
deleted = "[п“– Г—${count} ](bright-red)"
renamed = "[п‘Ё Г—${count} ](fg:214)"

[cmd_duration]
disabled = false
min_time = 1
format = "[у°”ӣ $duration]($style)"
show_milliseconds = true
style = "#CFC9C2"
## end prompt ##

