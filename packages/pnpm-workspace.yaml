# Pre-approved build-script allowlist for pnpm global installs.
# Copied to `pnpm root -g`/pnpm-workspace.yaml by packages.sh install_pnpm_packages.
#
# Without this, pnpm v10+ blocks postinstall/build scripts by default and
# prompts on every `pnpm update -g`. Add new entries here as you adopt
# globals that need build scripts (puppeteer, native-binding tools, etc.).
allowBuilds:
  '@google/genai': true
  '@vscode/vsce-sign': true
  bun: true
  core-js: true
  designlang: true
  esbuild: true
  keytar: true
  koffi: true
  opensrc: true
  protobufjs: true
  puppeteer: true
  sharp: true
  tree-sitter-cli: true
  workerd: true
